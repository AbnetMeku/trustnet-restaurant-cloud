services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - cloud-backend
    ports:
      - "8081:80"

  cloud-backend:
    build: .
    depends_on:
      - postgres
    ports:
      - "7000:7000"
    env_file:
      - .env
    volumes:
      - ./:/app
    command: ["sh", "docker/start.sh"]

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: trustnet_cloud
      POSTGRES_USER: trustnet_cloud
      POSTGRES_PASSWORD: trustnet_cloud_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
